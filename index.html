<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>PRMSU SM Campus Digital Twin</title> <!---kayo na bahala kung ano title | Also need nyo din change sa manifest.json ung "name": duon pag pinalitan niyo ito-->
  </head>
  <body>

    <!--MAIN PAGE-->
    <div id="page-main">
    </div>

    <!--3D MAP NAVIGATION PAGE-->
    <div id="page-3dmap">
      <canvas id="three-canvas"></canvas>
    </div>

    <!--LEGEND PAGE-->
    <div id="page-legend">
    </div>

    <!--ABOUT PAGE-->
    <div id="page-about">
    </div>

    <!--4TH YEAR PLACEHOLDERS-->
    <div id="page-3dtour"></div>
    <div id="page-devplan"></div>
    <div id="page-virtualtour"></div>

    <!--TUTORIAL OVERLAY (4th year)-->
    <div id="tutorial-overlay">
      <div id="tutorial-spotlight"></div>
      <img id="tutorial-sprite" />
      <div id="tutorial-textbox"></div>
      <button id="btn-skip">Skip</button>
      <button id="btn-back">Back</button>
      <button id="btn-next">Tap to Continue</button>
    </div>

    <!--Libraries-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pathfinding@0.4.18/visual/lib/pathfinding-browser.min.js"></script>

    <!--JS files-->
    <script src="js/main.js"></script>
    <script src="js/pathfinding.js"></script>
    <script src="js/gps.js"></script>
    <script src="js/ui.js"></script>

  </body>
</html>
